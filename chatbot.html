<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
      *{
        margin: 0px;
        padding: 0px;
      }
      body{
        font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      }
      .chat-input-container{
        display: flex;   
        margin-bottom: 60px;
      }
      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
        
      }
      .send-button{
        background-color: rgba(29, 141, 29, 0.9);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 12px;
        font-size: 15px;
        cursor: pointer;

      }
      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .chat-msg-user{
        display: flex;
        justify-content: end;
        column-gap: 10px;
        align-items: start;
      }
      .chat-msg-bot{
        display: flex;
        justify-content: start;
        column-gap: 10px;
        align-items: start;
      }
      .chat-msg-text{
        background-color: rgb(238, 238, 238);
        border-radius: 10px;
        padding: 15px 20px;
        margin-bottom: 10px;
        max-width: 300px;
      }
      .chat-msg-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>

    <script src="https://unpkg.com/supersimpledev/Chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
      function TextBox({value,setValue}){
        const [inputText,setInputText]=React.useState('');
        function changeInput(e){
          setInputText(e.target.value);
      
        }
        async function sendMessage(){
          const newValue = [
            ...value,
            {
              message: inputText,
              sender:'user',
              key:crypto.randomUUID()
            }
          ]
          setValue(newValue);
          setInputText('');
          const preresponse = 'Loading'
          setValue([
            ...newValue,
            {
              message: preresponse,
              sender:'bot',
              key:crypto.randomUUID()
            }
          ]);
          const response = await Chatbot.getResponseAsync(inputText);

          setValue([
            ...newValue,
            {
              message: response,
              sender:'bot',
              key:crypto.randomUUID()
            }
          ]);
        }
        function useEnter(e){
          if(e.key==='Enter'){
            sendMessage();
          }
          if(e.key==='Escape'){
            setInputText('');
          }
        }
        return(
          <div className="chat-input-container">
          <input 
            className="chat-input"
            type="text" 
            placeholder="Send a message to Chatbot" 
            size="60"
            onChange={changeInput}
            value={inputText}
            onKeyDown={useEnter}
            />
          <button className="send-button" onClick={sendMessage}>
            Send
          </button>
          </div>
        )
      }
      function Message(props){
        const msg=props.message;
        const sender = props.sender;

        return (
          <div className={sender==='user' ? 'chat-msg-user' : 'chat-msg-bot'}>
          {sender==="bot" 
            && 
            <img src="robot.png" 
            alt="user" 
            width="45px"/>
          }
          <div className="chat-msg-text">{msg}</div>
          {sender==="user" 
            && 
            <img src="user.png" 
            alt="user" 
            width="45px"/>
          }
          </div>
        )
      }



      function ChatMessages({value}){
        const refContainer = React.useRef(null);
        React.useEffect(()=>{
          const containerElement = refContainer.current;
          if(containerElement){
          containerElement.scrollTop=containerElement.scrollHeight;
          }
        },[value]);
        return (
          <div className="chat-msg-container"
          ref={refContainer}>
          {value.map((val)=>{
            return (
              <Message
              message={val.message}
              sender={val.sender}
              key = {val.key} />
            )
          })}
          </div>
      );
      }
      function App(){
        const arr =React.useState([]);
        const value = arr[0];
        const setValue = arr[1];
        return (
          <div className="app-container">
          <ChatMessages value={value}/>
          <TextBox value={value} setValue={setValue}/>
          <button className="change-position"></button>
          </div>
        )
      }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
